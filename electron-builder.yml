appId: com.qwen.studio.linux
productName: "Qwen Studio"
copyright: Copyright © 2026 Qwen Community

linux:
  target:
    - AppImage
    - deb
    - rpm
  category: Utility
  icon: "resources/icon.png"
  artifactName: "${productName}-${version}-${arch}.${ext}"
  protocols:
    - name: "Qwen Studio"
      schemes:
        - qwen
  mimeTypes:
    - "x-scheme-handler/qwen"

files:
  - "out/**/*"
  - "package.json"
  - "node_modules/**/*"
  - "!node_modules/@electron-toolkit/**/*"
  - "!node_modules/@types/**/*"
  - "!node_modules/electron/**/*"
  - "!src/**/*"
  - "!*.md"
  - "!tsconfig.json"
  - "!forge.config.ts"
  - "!scripts/**/*"
  - "!flatpak/**/*"
  - "!.github/**/*"
  - "!workspace.termcanvas"
  - "!test-electron.js"
  - "!FINDINGS_TEMPLATE.md"
  - "!KNOWN_ISSUES.md"
  - "!QWEN_DESKTOP_FINDINGS.md"
  - "!RESEARCH_AND_PLAN.md"
  - "!WINDOWS_INVESTIGATION_GUIDE.md"
  - "!.obsidian/**/*"

extraResources:
  - from: "resources/bun"
    to: "resources/bun"
  - from: "resources/uv"
    to: "resources/uv"
  - from: "resources/icon.png"
    to: "icon.png"
  - from: "qwen-core"
    to: "qwen-core"
    filter: [
      "src/**/*",
      "package.json",
      "skills/**/*",
      ".qwenrules",
      "!*.md",
      "!.git/**/*",
      "!node_modules/**/*",
      "!dist/**/*",
      "!out/**/*"
    ]

directories:
  output: "dist"

publish:
  provider: github
  owner: youssefvdel
  repo: qwen-studio
  releaseType: release
