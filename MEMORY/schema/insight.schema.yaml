type: object
required: [type, date, entities]
properties:
  type:        { const: insight }
  date:        { type: string, format: date }
  session:     { type: string }
  entities:    { type: array, items: { type: string } }
  title:       { type: string }
  content:     { type: string }
  sources:     { type: array, items: { type: string } }
