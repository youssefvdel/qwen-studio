<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob: 'unsafe-inline'; frame-src *; style-src * 'unsafe-inline';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qwen Studio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0f0f0f; }
    #loading { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); z-index: 9999; }
    #loading.fade-out { opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .logo { width: 80px; height: 80px; background: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; color: #667eea; margin-bottom: 24px; }
    .text { color: white; font-family: system-ui, sans-serif; font-size: 18px; }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; margin-top: 24px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">Q</div>
    <div class="text">Loading Qwen Studio...</div>
    <div class="spinner"></div>
  </div>

  <script type="module">
    const { invoke } = window.__TAURI__.core;
    const { getCurrentWindow } = window.__TAURI__.window;
    const { listen } = window.__TAURI__.event;

    async function init() {
      try {
        const version = await invoke('get_app_version');
        console.log('[Tauri] Qwen Studio v' + version);

        const info = await invoke('get_platform_info');
        console.log('[Tauri] Platform:', info.platform, info.arch);

        // Test MCP connect immediately
        console.log('[Tauri] Testing MCP connect...');
        try {
          await invoke('mcp_client_connect');
          console.log('[Tauri] MCP connect OK');
        } catch (e) {
          console.error('[Tauri] MCP connect failed:', e);
        }

        listen('event_from_main', (event) => {
          const { type, payload } = event.payload;
          if (type === 'set_cookie') {
            handleAuthCookie(payload);
          }
        });

        // Navigate to remote URL after bridge is ready
        console.log('[Tauri] Navigating to chat.qwen.ai...');
        window.location.href = 'https://chat.qwen.ai';

        document.getElementById('loading').classList.add('fade-out');
        setTimeout(() => document.getElementById('loading').remove(), 300);
      } catch (error) {
        console.error('[Tauri] Init error:', error);
        document.getElementById('loading').innerHTML = '<div class="text" style="color:white;text-align:center;padding:20px;">Error: ' + error.message + '</div>';
      }
    }

    async function handleAuthCookie(token) {
      if (!token) return;
      const url = new URL('https://chat.qwen.ai');
      url.searchParams.set('_tauri_auth', token);
      window.location.href = url.toString();
    }

    init();
  </script>
</body>
</html>
